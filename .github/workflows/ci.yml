name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests (audit scoring)
        run: npm run test:audit-scoring

      # Avoid stale/corrupt .next (esp. dev/types) if a future cache restores it
      - name: Clean Next & tool caches
        run: npm run clean:build-cache

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          DIRECT_URL: "postgresql://test:test@localhost:5432/test"
          NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "test"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
          OPENAI_API_KEY: "sk-placeholder"
          JWT_SECRET: "test-secret-min-16-chars"
          SITE_URL: "https://example.com"
          REDIS_URL: "redis://localhost:6379"
